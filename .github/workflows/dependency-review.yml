name: Dependency review and vulnerability scan

on:
  pull_request:

jobs:
  dependency-review:
    name: Dependency Review + OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: GitHub Dependency Review
        uses: actions/dependency-review-action@v5

      - name: Print Maven dependency tree
        run: mvn -B -DskipTests dependency:tree

      - name: Run OWASP Dependency-Check (Maven plugin)
        # Run the dependency-check Maven goal to produce a static vulnerabilities report.
        # This step is best-effort: it may fail the build if severe issues are found, so we tolerate non-zero exit
        # to ensure the workflow posts Dependency Review output even when the scanner fails.
        run: |
          mvn -B org.owasp:dependency-check-maven:check -Dformat=ALL || true
